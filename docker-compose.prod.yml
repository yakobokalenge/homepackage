version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:18-alpine
    container_name: homepackage-db-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homepackage-net

  # Redis
  redis:
    image: redis:7-alpine
    container_name: homepackage-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homepackage-net

  # Django Backend (Gunicorn)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homepackage-backend-prod
    restart: always
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=homepackage.settings.production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/2
    volumes:
      - backend_static_prod:/app/staticfiles
      - backend_media_prod:/app/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn homepackage.wsgi:application
             --bind 0.0.0.0:8000
             --workers 4
             --threads 2
             --timeout 120
             --access-logfile -
             --error-logfile -"
    networks:
      - homepackage-net

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homepackage-celery-worker-prod
    restart: always
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=homepackage.settings.production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A homepackage worker -l warning --concurrency=8 -O fair
    networks:
      - homepackage-net

  # Celery Beat
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homepackage-celery-beat-prod
    restart: always
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=homepackage.settings.production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A homepackage beat -l warning --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - homepackage-net

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: homepackage-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - backend_static_prod:/var/www/static:ro
      - backend_media_prod:/var/www/media:ro
      - frontend_dist:/var/www/frontend:ro
    depends_on:
      - backend
    networks:
      - homepackage-net

volumes:
  postgres_data_prod:
  redis_data_prod:
  backend_static_prod:
  backend_media_prod:
  frontend_dist:

networks:
  homepackage-net:
    driver: bridge
